<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} - {{SITE_TITLE}}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{PATH_PREFIX}}{{BRAND_FAVICON}}">
  <link rel="icon" type="image/png" sizes="64x64" href="{{PATH_PREFIX}}{{BRAND_LOGO}}">
  <link rel="stylesheet" href="{{PATH_PREFIX}}styles.css">
  {{THEME_CSS}}
  <!-- Syntax highlighting - Prism.js -->
  <link rel="stylesheet" href="{{PRISM_LIGHT_URL}}" id="prism-light">
  <link rel="stylesheet" href="{{PRISM_DARK_URL}}" id="prism-dark" disabled>
  {{PLUGIN_HEAD}}
  <script>
    // Apply saved theme immediately to prevent flash
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      }
      // Set Prism theme based on saved or system preference
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = saved === 'dark' || (!saved && prefersDark);
      if (isDark) {
        document.getElementById('prism-light')?.setAttribute('disabled', '');
        document.getElementById('prism-dark')?.removeAttribute('disabled');
      }
    })();
  </script>
</head>
<body class="{{BODY_CLASS}}">
  <div class="mobile-header">
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    <a href="{{PATH_PREFIX}}" class="mobile-logo" title="Home" data-initial="{{BRAND_INITIAL}}">
      {{MOBILE_BRAND_LOGO_IMG}}
    </a>
    <button class="mobile-theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo {{BRAND_LOGO_CLASS}}">
          <a href="{{BRAND_URL}}" class="logo-icon" data-initial="{{BRAND_INITIAL}}"{{BRAND_TARGET}}>
            {{SIDEBAR_BRAND_LOGO_IMG}}
          </a>
          <span class="logo-text">
            <a href="{{BRAND_URL}}" class="brand"{{BRAND_TARGET}}>{{BRAND_NAME}}</a>
            <a href="{{PATH_PREFIX}}" class="product">{{SITE_TITLE}}</a>
          </span>
        </div>
        <div class="header-tools">
          <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <div class="sidebar-meta">
            <span class="meta-version">{{VERSION}}</span>
            <span class="meta-branch">{{BRANCH}}</span>
          </div>
        </div>
      </div>
      <div class="sidebar-nav">
        {{NAV}}
      </div>
    </nav>
    <main class="content">
      <article class="prose">
        {{BREADCRUMBS}}
        {{PAGE_META}}
        {{CONTENT}}
      </article>
      {{TOC}}
    </main>
  </div>
  {{FOOTER}}
  <!-- Syntax highlighting - Prism.js -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <!-- Mermaid diagram support -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    function getMermaidTheme() {
      const theme = document.documentElement.getAttribute('data-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = theme === 'dark' || (!theme && prefersDark);
      return isDark ? 'dark' : 'neutral';
    }

    mermaid.initialize({
      startOnLoad: true,
      theme: getMermaidTheme()
    });

    // Re-render mermaid diagrams when theme changes
    window.reinitMermaid = async function() {
      mermaid.initialize({ startOnLoad: false, theme: getMermaidTheme() });
      const diagrams = document.querySelectorAll('.mermaid');
      for (const el of diagrams) {
        const code = el.getAttribute('data-mermaid-source');
        if (code) {
          el.innerHTML = code;
          el.removeAttribute('data-processed');
        }
      }
      await mermaid.run({ nodes: diagrams });
    };
  </script>
  {{PLUGIN_BODY_END}}
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      let next;
      if (current === 'dark') {
        next = 'light';
      } else if (current === 'light') {
        next = 'dark';
      } else {
        // No explicit theme set, toggle from system preference
        next = prefersDark ? 'light' : 'dark';
      }

      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);

      // Switch Prism theme
      const prismLight = document.getElementById('prism-light');
      const prismDark = document.getElementById('prism-dark');
      if (next === 'dark') {
        prismLight?.setAttribute('disabled', '');
        prismDark?.removeAttribute('disabled');
      } else {
        prismLight?.removeAttribute('disabled');
        prismDark?.setAttribute('disabled', '');
      }

      // Re-render mermaid diagrams with new theme
      if (window.reinitMermaid) {
        window.reinitMermaid();
      }
      if (window.reinitCharts) {
        window.reinitCharts();
      }
    }

    // Slides mode hash routing
    (function initSlidesMode() {
      const shell = document.querySelector('.slides-shell');
      if (!shell) return;

      const slides = Array.from(document.querySelectorAll('.slide'));
      if (!slides.length) return;

      const prevBtn = document.querySelector('.slide-prev');
      const nextBtn = document.querySelector('.slide-next');
      const counter = document.querySelector('.slide-counter');
      const progressBar = document.querySelector('.slide-progress-bar');
      const navLinks = Array.from(document.querySelectorAll('.sidebar-nav a[href^="#slide-"]'));
      let current = 0;

      function setActive(n) {
        current = Math.max(0, Math.min(n, slides.length - 1));
        slides.forEach((slide, idx) => slide.classList.toggle('active', idx === current));
        navLinks.forEach((link) => {
          const active = link.getAttribute('href') === '#' + slides[current].id;
          link.classList.toggle('active', active);
        });
        if (counter) counter.textContent = (current + 1) + ' / ' + slides.length;
        if (progressBar) progressBar.style.width = (((current + 1) / slides.length) * 100) + '%';
        if (prevBtn) prevBtn.disabled = current === 0;
        if (nextBtn) nextBtn.disabled = current === slides.length - 1;
        history.replaceState(null, '', '#' + slides[current].id);
      }

      function setFromHash() {
        const hash = window.location.hash || '';
        const idx = slides.findIndex((s) => '#' + s.id === hash);
        if (idx >= 0) setActive(idx);
        else setActive(0);
      }

      prevBtn?.addEventListener('click', () => setActive(current - 1));
      nextBtn?.addEventListener('click', () => setActive(current + 1));

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') {
          e.preventDefault();
          setActive(current + 1);
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          setActive(current - 1);
        } else if (e.key === 'Home') {
          e.preventDefault();
          setActive(0);
        } else if (e.key === 'End') {
          e.preventDefault();
          setActive(slides.length - 1);
        }
      });

      window.addEventListener('hashchange', setFromHash);
      setFromHash();
    })();

    // Copy code button
    document.querySelectorAll('.prose pre code').forEach(block => {
      const button = document.createElement('button');
      button.className = 'copy-button';
      button.textContent = 'Copy';
      button.onclick = async () => {
        await navigator.clipboard.writeText(block.textContent);
        button.textContent = 'Copied!';
        setTimeout(() => button.textContent = 'Copy', 2000);
      };
      block.parentElement.appendChild(button);
    });

    // Mobile nav toggle
    function toggleNav() {
      document.querySelector('.sidebar').classList.toggle('open');
    }

    // Close nav when clicking outside on mobile
    document.addEventListener('click', (e) => {
      const sidebar = document.querySelector('.sidebar');
      const toggle = document.querySelector('.nav-toggle');
      if (sidebar.classList.contains('open') &&
          !sidebar.contains(e.target) &&
          !toggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });
  </script>
  {{HOT_RELOAD_SCRIPT}}
</body>
</html>
